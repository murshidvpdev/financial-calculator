# =============================================================================
# CI Pipeline — Finance Calculator
# =============================================================================
#
# Triggered on:
#   - Every push to any branch (catches issues early)
#   - Every pull request targeting main or develop
#
# Pipeline stages (run in order, each depends on the previous):
#
#   1. lint     → ruff (import order, style) + mypy (type checking)
#   2. test     → pytest with coverage gate (>80%)
#   3. build    → docker build (verify image builds successfully)
#   4. scan     → trivy (container vulnerability scan)
#
# Why this order?
#   Lint is fastest (seconds). Test is slower (minutes). Build is slowest.
#   Fail fast: if lint fails, don't waste CI minutes running tests.
#
# Interview: "Our CI pipeline enforces quality at every commit. Lint catches
# style/type issues in seconds. Tests give confidence in behavior. Container
# build verifies the artifact is producible. Trivy scans for CVEs before
# anything reaches staging."
# =============================================================================

name: CI — Lint, Test, Build, Scan

on:
  push:
    branches:
      - "**"      # All branches — catch issues as early as possible
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress runs for the same branch/PR when a new commit is pushed
# Prevents multiple CI runs from piling up on rapid pushes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions by default (principle of least privilege)
permissions:
  contents: read
  pull-requests: write    # Needed to post coverage comments on PRs


# =============================================================================
# JOB 1: LINT
# =============================================================================
# Checks code style and type correctness without running the app.
# Fastest job — runs first so we fail fast on trivial issues.
# =============================================================================

jobs:
  lint:
    name: "Lint (ruff + mypy)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend   # All commands run from backend/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # actions/checkout@v4: Official GitHub action to clone the repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          # cache: pip caches the pip download cache, not the venv
          # If requirements.txt hasn't changed, packages are restored from cache
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy

      - name: Run ruff (linter + formatter check)
        run: |
          # Check code style and import order
          ruff check .
          # Check that code is formatted (doesn't modify, just verifies)
          ruff format --check .

      - name: Run mypy (type checker)
        run: |
          # Install stubs for mypy to understand untyped packages
          pip install types-passlib types-python-dateutil types-redis types-cffi
          mypy app/ --ignore-missing-imports --no-strict-optional
        # --ignore-missing-imports: Don't fail on third-party packages without stubs
        # --no-strict-optional: Less strict about Optional types (useful while building)
        continue-on-error: true   # mypy failures are warnings in CI (not blockers yet)
        # TODO: Remove continue-on-error once the codebase is fully typed


# =============================================================================
# JOB 2: TEST
# =============================================================================
# Runs the full pytest suite with a real PostgreSQL database.
# GitHub Actions provides service containers (Docker) for test dependencies.
# =============================================================================

  test:
    name: "Test (pytest + coverage)"
    runs-on: ubuntu-latest
    needs: lint    # Only run if lint passes

    # Service containers run alongside the test job
    # They are started before the job steps and stopped after
    services:
      # PostgreSQL — same version as production
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finance_user
          POSTGRES_PASSWORD: test_password_ci
          POSTGRES_DB: finance_test_db
        # Health check: wait until postgres is ready before running tests
        options: >-
          --health-cmd "pg_isready -U finance_user -d finance_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432   # Expose to job container

      # Redis — for token blacklist, rate limiting
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    env:
      # Point tests at the service containers (localhost in the runner)
      DATABASE_URL: postgresql+asyncpg://finance_user:test_password_ci@localhost:5432/finance_test_db
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-jwt-secret-key-min-32-chars-long
      SECRET_KEY: ci-test-app-secret-key-min-32-chars-long
      ENV: testing
      DEBUG: "false"
      LOG_LEVEL: WARNING    # Suppress logs during tests (less noise in CI output)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL to be ready
        # Extra wait — service health check passes when pg_isready returns 0,
        # but the DB might not be fully accepting connections yet
        run: |
          until pg_isready -h localhost -U finance_user -d finance_test_db; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done
          echo "PostgreSQL is ready!"

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v \
            --tb=short
        # --cov-fail-under=80: Fail the CI job if coverage drops below 80%
        # --cov-report=xml: Machine-readable format for Codecov upload
        # --tb=short: Show short tracebacks on failure (less noise)

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v4
        if: always()    # Upload even if tests fail (useful to see what's covered)
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false    # Don't fail CI if Codecov is down
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Post coverage summary as PR comment
        uses: MishaKav/pytest-coverage-comment@main
        if: github.event_name == 'pull_request'
        with:
          pytest-xml-coverage-path: backend/coverage.xml
          title: "Test Coverage Report"
          badge-title: "Coverage"
        continue-on-error: true


# =============================================================================
# JOB 3: BUILD
# =============================================================================
# Verifies the Docker image builds successfully.
# Does NOT push to any registry (that happens in cd-staging.yml / cd-production.yml).
# =============================================================================

  build:
    name: "Build Docker image"
    runs-on: ubuntu-latest
    needs: test    # Only build if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx: Enhanced Docker build with cache support, multi-platform builds
        # Required for --cache-from/--cache-to flags

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend        # Build context = backend directory
          file: ./backend/Dockerfile
          target: runtime           # Only build the runtime stage
          push: false               # Don't push — CI only verifies it builds
          tags: finance-calculator:${{ github.sha }}
          # Layer cache: Store build layers in GitHub Actions cache
          # Reused across runs → dramatically faster rebuilds (seconds vs minutes)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args: inject at build time (not baked into image as env vars)
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: Export image for scan
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: false
          # Export image to local Docker daemon so trivy can scan it
          load: true
          tags: finance-calculator:scan
          cache-from: type=gha


# =============================================================================
# JOB 4: SECURITY SCAN (Trivy)
# =============================================================================
# Trivy is an open-source vulnerability scanner by Aqua Security.
# Scans the Docker image for:
#   - OS-level CVEs (in base image packages)
#   - Application-level CVEs (in Python packages from requirements.txt)
#   - Exposed secrets (accidentally baked into the image)
#
# Interview: "We run Trivy in CI so vulnerabilities are caught before deployment.
# It scans both the OS layer and Python packages. Critical CVEs fail the build.
# Results are uploaded to GitHub Security tab for tracking."
# =============================================================================

  scan:
    name: "Security scan (Trivy)"
    runs-on: ubuntu-latest
    needs: build    # Scan the built image

    permissions:
      security-events: write    # Required to upload SARIF results to GitHub Security tab

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Rebuild image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: false
          load: true
          tags: finance-calculator:scan
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "finance-calculator:scan"
          format: "sarif"           # SARIF: Standard format for security results
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH" # Only report critical and high CVEs
          exit-code: "0"            # Don't fail CI for now (0 = always pass)
          # TODO: Change to exit-code: "1" when baseline CVEs are resolved
          # This lets us establish a baseline first, then enforce later
          ignore-unfixed: true      # Skip CVEs with no available fix yet

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true   # Don't fail if SARIF upload fails

      - name: Show Trivy summary in CI logs (table format)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "finance-calculator:scan"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
