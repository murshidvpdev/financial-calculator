# =============================================================================
# FINANCE CALCULATOR — Docker Compose (Full Application Stack)
# =============================================================================
# This file runs the COMPLETE application stack in Docker:
#   app      → FastAPI application (built from Dockerfile)
#   postgres → PostgreSQL database
#   redis    → Redis cache + session store
#   nginx    → Reverse proxy (HTTPS termination, static files)
#
# Difference from docker-compose.yml (development):
#   docker-compose.yml:      Only database services (app runs on host for hot-reload)
#   docker-compose.prod.yml: EVERYTHING in Docker (closer to production)
#
# Usage:
#   docker compose -f infra/docker-compose.prod.yml up --build
#   docker compose -f infra/docker-compose.prod.yml down
#   docker compose -f infra/docker-compose.prod.yml logs -f app
#
# Environment variables:
#   Copy .env.example to .env and fill in secrets before running.
#   docker compose reads .env automatically from the current directory.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # FastAPI Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ../backend     # Dockerfile is in backend/
      dockerfile: Dockerfile  # Use our multi-stage Dockerfile
      target: runtime         # Use only the runtime stage (not builder)

    container_name: finance_app
    restart: unless-stopped

    image: finance-calculator:latest   # Tag for ECR push

    environment:
      # Database (connects to the postgres service by hostname "postgres")
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-finance_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-finance_db}
      DATABASE_POOL_SIZE: 5
      DATABASE_MAX_OVERFLOW: 10

      # Redis (connects to the redis service by hostname "redis")
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

      # JWT secrets (MUST be overridden in production!)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7

      # App settings
      APP_NAME: Finance Calculator
      APP_VERSION: 0.1.0
      ENV: production
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 4

      # CORS (your frontend domain)
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}

      # Logging
      LOG_LEVEL: INFO

    ports:
      - "8000:8000"     # Expose for development/testing
      # In production: nginx handles external traffic, no direct port exposure

    volumes:
      # Persist uploaded files (receipts, etc.)
      - app_uploads:/app/uploads

    depends_on:
      postgres:
        condition: service_healthy   # Wait until DB is accepting connections
      redis:
        condition: service_healthy   # Wait until Redis is ready

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # FastAPI startup takes longer with alembic migrations

    networks:
      - finance_network

    # Resource limits (ECS-style)
    # Prevents the app from eating all host resources
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M


  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: finance_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finance_db}
      POSTGRES_USER: ${POSTGRES_USER:-finance_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../infra/init-scripts:/docker-entrypoint-initdb.d:ro  # Read-only mount

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance_user} -d ${POSTGRES_DB:-finance_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - finance_network

    # No external port exposure in production!
    # Only the app service can reach postgres via the private finance_network

    deploy:
      resources:
        limits:
          memory: 1G


  # ---------------------------------------------------------------------------
  # Redis — Cache, Sessions, Task Queue Broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: finance_redis
    restart: unless-stopped

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec

    # appendfsync everysec: Flush to disk every second (balance of performance/durability)
    # allkeys-lru: When memory full, evict least recently used keys

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - finance_network

    # No external port exposure in production
    # App connects via redis://redis:6379 within the private network

    deploy:
      resources:
        limits:
          memory: 512M


  # ---------------------------------------------------------------------------
  # Nginx — Reverse Proxy (Production)
  # ---------------------------------------------------------------------------
  # Handles:
  #   - HTTPS termination (TLS certificates from Let's Encrypt)
  #   - Serving static files (faster than FastAPI)
  #   - Rate limiting at the proxy level
  #   - Load balancing (if scaling to multiple app containers)
  #
  # In development, you can skip nginx and hit FastAPI directly (port 8000).
  # In production, ALL external traffic goes through nginx (port 80/443).
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: finance_nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ../backend/static:/var/www/static:ro   # Nginx serves static files directly
      - nginx_logs:/var/log/nginx
      # In production: mount SSL certificates here
      # - ./ssl:/etc/nginx/ssl:ro

    depends_on:
      - app

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - finance_network


# =============================================================================
# NETWORKS
# =============================================================================
networks:
  finance_network:
    driver: bridge
    name: finance_network
    # All services communicate via this private network.
    # External access only through explicitly exposed ports.


# =============================================================================
# VOLUMES — Persistent Storage
# =============================================================================
volumes:
  postgres_data:
    name: finance_postgres_data

  redis_data:
    name: finance_redis_data

  app_uploads:
    name: finance_app_uploads

  nginx_logs:
    name: finance_nginx_logs
