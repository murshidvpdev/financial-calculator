<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Finance Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center p-4">

<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <div class="text-5xl mb-3">💰</div>
    <h1 class="text-2xl font-bold text-gray-900">Create your account</h1>
    <p class="text-gray-500 text-sm mt-1">Start tracking your finances today</p>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

    {% if error %}
    <div class="mb-5 flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm">
      <span>⚠️</span><span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="POST" action="/web/register" class="space-y-4">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">First name</label>
          <input type="text" name="first_name" placeholder="Jane"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Last name</label>
          <input type="text" name="last_name" placeholder="Smith"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email address</label>
        <input type="email" name="email" required autofocus placeholder="you@example.com"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
        <input type="text" name="username" required placeholder="jane_smith" minlength="3" maxlength="30"
          pattern="[a-zA-Z0-9_]+"
          title="Letters, numbers, and underscores only"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        <p class="text-xs text-gray-400 mt-1">Letters, numbers, and underscores only</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
        <input type="password" name="password" required placeholder="••••••••" minlength="8"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        <p class="text-xs text-gray-400 mt-1">Min 8 chars · One uppercase · One number</p>
      </div>

      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 mt-2">
        Create Account
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a href="/login" class="text-blue-600 hover:text-blue-700 font-medium">Sign in</a>
    </p>
  </div>
</div>

</body>
</html>
