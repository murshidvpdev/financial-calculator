# =============================================================================
# Nginx Main Configuration — Finance Calculator
# =============================================================================
#
# Architecture:
#   Internet → Nginx (80/443) → FastAPI app (8000) on finance_network
#
# Nginx responsibilities:
#   - HTTPS termination (TLS)
#   - Rate limiting at the proxy level
#   - Serving static files directly (bypasses Python entirely)
#   - Gzip compression
#   - Security headers
#   - Load balancing (if multiple app containers)
#
# The per-site config lives in conf.d/app.conf (included below).
# This file only sets global/worker settings.
# =============================================================================

# ── Worker processes ──────────────────────────────────────────────────────────
# auto: One worker per CPU core. Optimal for I/O-bound workloads like proxying.
worker_processes auto;

# Maximum number of open file descriptors per worker (connections + files)
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;


# ── Events block ──────────────────────────────────────────────────────────────
events {
    # Maximum simultaneous connections per worker
    # Total connections = worker_processes × worker_connections
    worker_connections 1024;

    # Accept as many connections as possible (not just one at a time)
    multi_accept on;

    # epoll: Linux's most efficient I/O event notification mechanism
    use epoll;
}


# ── HTTP block ────────────────────────────────────────────────────────────────
http {

    # ── MIME types ────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging format ────────────────────────────────────────────────────────
    # JSON-structured logs for easier parsing in CloudWatch
    log_format main_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log main_json;

    # ── Performance ───────────────────────────────────────────────────────────
    # sendfile: Use kernel-level file transfer (bypasses userspace copy)
    sendfile on;

    # tcp_nopush: Send HTTP response headers in one packet (optimization)
    tcp_nopush on;

    # tcp_nodelay: Disable Nagle's algorithm for low-latency responses
    tcp_nodelay on;

    # Keep connections alive for 65s (reduces TCP handshake overhead)
    keepalive_timeout 65;

    # Maximum size of types hash table (MIME types lookup)
    types_hash_max_size 2048;

    # ── Gzip compression ──────────────────────────────────────────────────────
    # Compresses responses before sending to client
    # Typical compression ratio: 70-90% for JSON/HTML
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;          # 1 (fastest) to 9 (best compression); 6 is a good balance
    gzip_min_length 1024;       # Don't compress tiny responses (overhead not worth it)
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Defined here (http block) so they can be shared across server blocks
    #
    # limit_req_zone: Defines a shared memory zone for tracking request rates
    # $binary_remote_addr: Key = client IP (binary form = 4 bytes vs 16 bytes for text)
    # zone=api_limit:10m: Zone named "api_limit", 10MB RAM (~160,000 IP addresses)
    # rate=10r/s: Allow 10 requests per second per IP (burst controlled in conf.d)

    # General API rate limit (10 req/sec per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Stricter rate limit for auth endpoints (5 req/min per IP)
    # Prevents brute force login attacks
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # ── Security: hide nginx version ──────────────────────────────────────────
    # Prevents "Server: nginx/1.27.0" in response headers (reduces attack surface)
    server_tokens off;

    # ── Proxy buffer settings ─────────────────────────────────────────────────
    # How much response to buffer before sending to client
    # Prevents slow clients from holding upstream connections open
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # ── Client upload size ────────────────────────────────────────────────────
    # Max request body size (for file uploads). 10MB allows receipt images.
    client_max_body_size 10M;

    # ── Include per-site configs ──────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
