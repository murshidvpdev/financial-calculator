# =============================================================================
# SECRET — Sensitive configuration values
# =============================================================================
# Kubernetes Secrets store sensitive data encoded in base64 (NOT encrypted!).
#
# ⚠️  IMPORTANT: base64 is encoding, not encryption.
#     `echo -n "mypassword" | base64` → anyone can decode it.
#     Secrets in etcd are encrypted at rest in production clusters (AWS EKS does this).
#     NEVER commit real Secret values to git — this file has PLACEHOLDER values.
#
# Production secret management options:
#   1. AWS Secrets Manager + External Secrets Operator (recommended for EKS)
#   2. HashiCorp Vault + Vault Agent Injector
#   3. Sealed Secrets (encrypt with public key, safe to commit)
#   4. kubectl create secret (manual, not in git)
#
# How to generate base64 values:
#   echo -n "your-actual-value" | base64
#
# The values below are PLACEHOLDERS — replace before deploying.
# =============================================================================

