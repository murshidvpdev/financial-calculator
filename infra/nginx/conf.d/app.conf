# =============================================================================
# Nginx Server Block — Finance Calculator App
# =============================================================================
#
# This file defines:
#   1. HTTP server (port 80) → redirect to HTTPS
#   2. HTTPS server (port 443) → proxy to FastAPI app
#
# Upstream:
#   "app" service on finance_network, port 8000
#   Docker DNS resolves "app" to the container's IP automatically.
#
# In DEVELOPMENT: You can hit FastAPI directly at localhost:8000
# In PRODUCTION:  All traffic goes through nginx (ports 80/443)
# =============================================================================


# ── Upstream definition ───────────────────────────────────────────────────────
# "upstream" defines a backend group. Even with one server, using upstream
# makes it easy to add more servers for load balancing later.
#
# keepalive 32: Maintain 32 persistent connections to the upstream app.
# This avoids TCP handshake overhead for every proxied request.

upstream fastapi_app {
    server app:8000;
    keepalive 32;
}


# =============================================================================
# SERVER 1: HTTP → HTTPS Redirect
# =============================================================================
# All HTTP traffic is permanently redirected to HTTPS.
# 301 redirect: tells browsers and search engines this is permanent.
# =============================================================================

server {
    listen 80;
    listen [::]:80;     # IPv6

    server_name _;      # Catch-all (replace with your domain in production)

    # ── ACME challenge (Let's Encrypt certificate renewal) ────────────────────
    # Let's Encrypt needs to reach /.well-known/acme-challenge/ over HTTP
    # to verify you own the domain. This must be served before the redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Redirect everything else to HTTPS ─────────────────────────────────────
    location / {
        return 301 https://$host$request_uri;
    }
}


# =============================================================================
# SERVER 2: HTTPS — Main Application
# =============================================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name _;      # Replace with: server_name finance.yourdomain.com;

    # ── SSL/TLS Configuration ─────────────────────────────────────────────────
    # In production: mount your certificates from Let's Encrypt or ACM.
    # Uncomment and update these paths when you have real certs.
    #
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    # For local testing with self-signed certs (generated with openssl):
    # openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #   -keyout ssl/privkey.pem -out ssl/fullchain.pem \
    #   -subj "/C=US/ST=State/L=City/O=Finance/CN=localhost"

    # Modern TLS only (disable old, vulnerable versions)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suites only (prefer server's ciphers over client's)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;    # Let TLS 1.3 clients choose freely

    # Session resumption (avoids full TLS handshake on reconnect)
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;    # Off: forward secrecy (tickets can decrypt past sessions)

    # OCSP Stapling: Server fetches certificate validity status and attaches it
    # Clients don't need to contact the CA themselves (faster, more private)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;

    # ── Security Headers ──────────────────────────────────────────────────────
    # These headers harden the browser's security posture

    # HSTS: Force HTTPS for 1 year. includeSubDomains: applies to all subdomains.
    # preload: Can be submitted to browser preload lists (permanent HTTPS)
    # WARNING: Only add preload when you're SURE you want permanent HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Prevent browsers from MIME-sniffing the content type
    add_header X-Content-Type-Options "nosniff" always;

    # Prevent clickjacking: page cannot be embedded in iframes from other origins
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Enable browser XSS filter (legacy, modern browsers use CSP instead)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer Policy: Only send origin (not full URL) for cross-origin requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy: Disable access to sensitive browser APIs
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy: Restrict what resources the page can load
    # Note: Adjust for your actual frontend needs (CDN, analytics, etc.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net unpkg.com; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Static Files ──────────────────────────────────────────────────────────
    # Nginx serves static files DIRECTLY — bypasses Python entirely.
    # FastAPI would need to read files from disk and send via Python.
    # Nginx serves directly from kernel (sendfile syscall) → much faster.

    location /static/ {
        alias /var/www/static/;

        # Cache static files for 30 days (browsers + CDN)
        # max-age: Cache for 30 days
        # public: Allow CDN (CloudFront) to cache this
        # immutable: Browser won't re-validate even on refresh
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";

        # Gzip static files if not pre-compressed
        gzip_static on;

        # Return 404 if file doesn't exist (don't fall through to app)
        try_files $uri =404;
    }

    # ── Favicon ───────────────────────────────────────────────────────────────
    location = /favicon.ico {
        alias /var/www/static/images/favicon.ico;
        expires 30d;
        log_not_found off;    # Don't log 404 for missing favicon (common)
    }

    # ── Health check endpoint ─────────────────────────────────────────────────
    # Health checks from load balancers hit this endpoint frequently.
    # We skip rate limiting and access logging for health checks.
    location = /api/v1/health/live {
        access_log off;        # Don't pollute logs with health check noise
        proxy_pass http://fastapi_app;

        # Proxy headers (FastAPI needs these to know the real client IP)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Auth endpoints (stricter rate limit) ──────────────────────────────────
    # These endpoints handle login/register — must be protected against brute force
    # auth_limit: 5 requests/minute per IP (defined in nginx.conf)
    # burst=10: Allow 10 requests in a burst (handles form resubmissions)
    # nodelay: Don't queue bursted requests — reject excess immediately

    location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;    # Return 429 Too Many Requests (not 503)

        proxy_pass http://fastapi_app;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        # Timeout settings
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── API endpoints (standard rate limit) ──────────────────────────────────
    # General API: 10 requests/second per IP (defined in nginx.conf)
    # burst=20: Short bursts up to 20 requests (handles real user behavior)
    # nodelay: Reject excess immediately (don't make users wait in queue)

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://fastapi_app;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        # HTTP/1.1 is required for keepalive to upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";    # Clear "Connection: close" from HTTP/1.0

        # Timeout settings
        proxy_connect_timeout 10s;    # Time to establish connection to upstream
        proxy_send_timeout    60s;    # Time to send request to upstream
        proxy_read_timeout    60s;    # Time to receive response from upstream

        # Buffering: Nginx buffers the full response before sending to slow clients
        # This frees the upstream (FastAPI) from waiting for slow clients
        proxy_buffering    on;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }

    # ── All other routes (Jinja2 pages) ───────────────────────────────────────
    # Dashboard, login page, etc. are served by FastAPI's Jinja2 templates
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://fastapi_app;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    # When nginx itself returns these errors (not the upstream app)
    error_page 429 /errors/429.json;
    error_page 502 503 504 /errors/5xx.json;

    location = /errors/429.json {
        internal;    # Only reachable from nginx (not from external requests)
        return 429 '{"error": "Too many requests. Please slow down.", "status": 429}';
        add_header Content-Type application/json always;
    }

    location = /errors/5xx.json {
        internal;
        return 503 '{"error": "Service temporarily unavailable.", "status": 503}';
        add_header Content-Type application/json always;
    }
}


