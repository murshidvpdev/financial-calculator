<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Finance Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center p-4">

<div class="w-full max-w-md">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="text-5xl mb-3">💰</div>
    <h1 class="text-2xl font-bold text-gray-900">Finance Calculator</h1>
    <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

    <!-- Error message -->
    {% if error %}
    <div class="mb-5 flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm">
      <span>⚠️</span>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <!-- Success message (e.g., after registration) -->
    {% if request.query_params.get('success') %}
    <div class="mb-5 flex items-center gap-2 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl text-sm">
      <span>✅</span>
      <span>{{ request.query_params.get('success') }}</span>
    </div>
    {% endif %}

    <form method="POST" action="/web/login" class="space-y-5">
      <input type="hidden" name="next" value="{{ next }}">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email address</label>
        <input
          type="email"
          name="email"
          required
          autofocus
          placeholder="you@example.com"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        >
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
        <input
          type="password"
          name="password"
          required
          placeholder="••••••••"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        >
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
      >
        Sign In
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account?
      <a href="/register" class="text-blue-600 hover:text-blue-700 font-medium">Create one free</a>
    </p>
  </div>

  <!-- Demo credentials hint -->
  <p class="text-center text-xs text-gray-400 mt-4">
    Use the API at <a href="/docs" class="underline">/docs</a> to create an account, then sign in here.
  </p>
</div>

</body>
</html>
